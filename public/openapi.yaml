  /stores/{storeId}/reports/overview:
    parameters:
      - { name: storeId, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [Reports]
      summary: Visão geral analítica (dashboard)
      parameters:
        - { name: dateFrom, in: query, required: true, schema: { type: string, format: date } }
        - { name: dateTo, in: query, required: true, schema: { type: string, format: date } }
        - { name: granularity, in: query, schema: { type: string, enum: [day, week, month], default: day } }
      responses:
        '200':
          description: Dados analíticos do período
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      totalRevenue: { type: number }
                      totalOrders: { type: integer }
                      avgTicket: { type: number }
                      cmvTotal: { type: number }
                      cmvPercent: { type: number }
                      revenueByDay:
                        type: array
                        items:
                          type: object
                          properties:
                            date: { type: string, format: date }
                            revenue: { type: number }
                            orders: { type: integer }
                      topProducts:
                        type: array
                        items:
                          type: object
                          properties:
                            productId: { type: string, format: uuid }
                            name: { type: string }
                            quantity: { type: integer }
                            revenue: { type: number }
                      ordersByChannel:
                        type: object
                        additionalProperties: { type: integer }
                      ordersByStatus:
                        type: object
                        additionalProperties: { type: integer }

  # ── AUDIT ─────────────────────────────────────────────────────────────────

  /stores/{storeId}/audit:
    parameters:
      - { name: storeId, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [Audit]
      summary: Log de auditoria
      parameters:
        - { name: page, in: query, schema: { type: integer, minimum: 1, default: 1 } }
        - { name: limit, in: query, schema: { type: integer, minimum: 1, maximum: 100, default: 20 } }
        - { name: action, in: query, schema: { type: string, description: 'Ex: order.created' } }
        - { name: userId, in: query, schema: { type: string, format: uuid } }
        - { name: entityType, in: query, schema: { type: string, description: 'Ex: Order, Customer' } }
        - { name: dateFrom, in: query, schema: { type: string, format: date } }
        - { name: dateTo, in: query, schema: { type: string, format: date } }
      responses:
        '200':
          description: Log de auditoria
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { type: array, items: { $ref: '#/components/schemas/AuditLog' } }
                  pagination: { $ref: '#/components/schemas/PaginationMeta' }

  # ── INTEGRATIONS ──────────────────────────────────────────────────────────

  /stores/{storeId}/integrations:
    parameters:
      - { name: storeId, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [Integrations]
      summary: Listar integrações da loja
      responses:
        '200':
          description: Integrações
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { type: array, items: { $ref: '#/components/schemas/Integration' } }

  /stores/{storeId}/integrations/{platform}:
    parameters:
      - { name: storeId, in: path, required: true, schema: { type: string, format: uuid } }
      - { name: platform, in: path, required: true, schema: { type: string, enum: [IFOOD, RAPPI, AIQFOME] } }
    get:
      tags: [Integrations]
      summary: Obter integração por plataforma
      responses:
        '200':
          description: Integração
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Integration' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [Integrations]
      summary: Configurar integração
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                credentials: { type: object }
                status: { type: string, enum: [ACTIVE, INACTIVE] }
      responses:
        '200':
          description: Integração atualizada
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Integration' }
        '404': { $ref: '#/components/responses/NotFound' }

  /stores/{storeId}/integrations/{platform}/sync:
    parameters:
      - { name: storeId, in: path, required: true, schema: { type: string, format: uuid } }
      - { name: platform, in: path, required: true, schema: { type: string, enum: [IFOOD, RAPPI, AIQFOME] } }
    post:
      tags: [Integrations]
      summary: Disparar sincronização manual com a plataforma
      responses:
        '200':
          description: Sincronização disparada
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      synced: { type: integer }
                      errors: { type: integer }
        '404': { $ref: '#/components/responses/NotFound' }

  # ── PUBLIC ────────────────────────────────────────────────────────────────

  /public/stores/{slug}:
    parameters:
      - { name: slug, in: path, required: true, schema: { type: string } }
    get:
      tags: [Public]
      summary: Obter cardápio público da loja pelo slug
      description: Endpoint público sem autenticação. Retorna dados do cardápio para o canal de vendas digital.
      security: []
      responses:
        '200':
          description: Cardápio público
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      store: { $ref: '#/components/schemas/StoreBase' }
                      menus: { type: array, items: { $ref: '#/components/schemas/Menu' } }
                      categories: { type: array, items: { $ref: '#/components/schemas/Category' } }
                      products: { type: array, items: { $ref: '#/components/schemas/Product' } }
        '404': { $ref: '#/components/responses/NotFound' }
