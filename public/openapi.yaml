                  data: { type: array, items: { $ref: '#/components/schemas/Customer' } }
                  pagination: { $ref: '#/components/schemas/PaginationMeta' }
    post:
      tags: [Customers]
      summary: Criar cliente
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
