  # ── ORDERS ────────────────────────────────────────────────────────────────

  /stores/{storeId}/orders:
    parameters:
      - { name: storeId, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [Orders]
      summary: Listar pedidos
      parameters:
        - { name: page, in: query, schema: { type: integer, minimum: 1, default: 1 } }
        - { name: limit, in: query, schema: { type: integer, minimum: 1, maximum: 100, default: 20 } }
        - { name: status, in: query, schema: { type: string, enum: [PENDING, CONFIRMED, PREPARING, READY, DELIVERED, CANCELLED] } }
        - { name: channel, in: query, schema: { type: string, enum: [COUNTER, DELIVERY, TABLE, WHATSAPP, IFOOD] } }
        - { name: customerId, in: query, schema: { type: string, format: uuid } }
        - { name: dateFrom, in: query, schema: { type: string, format: date } }
        - { name: dateTo, in: query, schema: { type: string, format: date } }
      responses:
        '200':
          description: Lista paginada de pedidos
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { type: array, items: { $ref: '#/components/schemas/Order' } }
                  pagination: { $ref: '#/components/schemas/PaginationMeta' }
    post:
      tags: [Orders]
      summary: Criar pedido
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                channel: { type: string, enum: [COUNTER, DELIVERY, TABLE, WHATSAPP, IFOOD] }
                customerId: { type: string, format: uuid, nullable: true }
                tableNumber: { type: string, nullable: true }
                notes: { type: string, maxLength: 500, nullable: true }
                discount: { type: number, minimum: 0 }
                items:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    properties:
                      productId: { type: string, format: uuid }
                      quantity: { type: integer, minimum: 1 }
                      unitPrice: { type: number, minimum: 0 }
                      notes: { type: string, nullable: true }
                      selectedModifiers:
                        type: array
                        items:
                          type: object
                          properties:
                            modifierId: { type: string, format: uuid }
                    required: [productId, quantity, unitPrice]
              required: [channel, items]
      responses:
        '201':
          description: Pedido criado
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Order' }

  /stores/{storeId}/orders/{orderId}:
    parameters:
      - { name: storeId, in: path, required: true, schema: { type: string, format: uuid } }
      - { name: orderId, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [Orders]
      summary: Obter pedido
      responses:
        '200':
          description: Pedido
          content:
            application/json:
              schema:
                type: object
                properties:
