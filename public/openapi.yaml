        - { name: status, in: query, schema: { type: string, enum: [ACTIVE, BLOCKED] } }
        - { name: search, in: query, schema: { type: string } }
        - { name: sort, in: query, schema: { type: string, enum: [name, last_order_at, total_spent, total_orders, created_at], default: last_order_at } }
