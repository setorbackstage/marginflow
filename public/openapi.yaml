  # ── INVENTORY ──────────────────────────────────────────────────────────────

  /stores/{storeId}/inventory/ingredients:
    parameters:
      - { name: storeId, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [Inventory]
      summary: Listar ingredientes
      parameters:
        - { name: page, in: query, schema: { type: integer, minimum: 1, default: 1 } }
        - { name: limit, in: query, schema: { type: integer, minimum: 1, maximum: 100, default: 20 } }
        - { name: status, in: query, schema: { type: string, enum: [ACTIVE, INACTIVE] } }
        - { name: search, in: query, schema: { type: string } }
        - { name: lowStock, in: query, schema: { type: boolean } }
      responses:
        '200':
          description: Lista paginada de ingredientes
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { type: array, items: { $ref: '#/components/schemas/Ingredient' } }
                  pagination: { $ref: '#/components/schemas/PaginationMeta' }
    post:
      tags: [Inventory]
      summary: Criar ingrediente
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string, minLength: 1, maxLength: 100 }
                unit: { type: string, enum: [G, KG, ML, L, UN] }
                currentStock: { type: number, minimum: 0 }
                minStock: { type: number, minimum: 0, nullable: true }
                costPerUnit: { type: number, minimum: 0, nullable: true }
                category: { type: string, nullable: true }
              required: [name, unit]
      responses:
        '201':
          description: Ingrediente criado
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Ingredient' }

  /stores/{storeId}/inventory/ingredients/{ingredientId}:
    parameters:
      - { name: storeId, in: path, required: true, schema: { type: string, format: uuid } }
      - { name: ingredientId, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [Inventory]
      summary: Obter ingrediente
      responses:
        '200':
          description: Ingrediente
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Ingredient' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [Inventory]
      summary: Atualizar ingrediente
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string, minLength: 1, maxLength: 100 }
                unit: { type: string, enum: [G, KG, ML, L, UN] }
                minStock: { type: number, minimum: 0, nullable: true }
                costPerUnit: { type: number, minimum: 0, nullable: true }
                category: { type: string, nullable: true }
                status: { type: string, enum: [ACTIVE, INACTIVE] }
      responses:
        '200':
          description: Ingrediente atualizado
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Ingredient' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [Inventory]
      summary: Excluir ingrediente (soft delete)
      responses:
        '204': { description: Ingrediente excluído }
        '404': { $ref: '#/components/responses/NotFound' }

  /stores/{storeId}/inventory/movements:
    parameters:
      - { name: storeId, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [Inventory]
      summary: Listar movimentações de estoque
      parameters:
        - { name: page, in: query, schema: { type: integer, minimum: 1, default: 1 } }
        - { name: limit, in: query, schema: { type: integer, minimum: 1, maximum: 100, default: 20 } }
        - { name: ingredientId, in: query, schema: { type: string, format: uuid } }
        - { name: type, in: query, schema: { type: string, enum: [ENTRY, EXIT, LOSS, ADJUSTMENT] } }
      responses:
        '200':
          description: Lista paginada de movimentações
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { type: array, items: { $ref: '#/components/schemas/StockMovement' } }
                  pagination: { $ref: '#/components/schemas/PaginationMeta' }
    post:
      tags: [Inventory]
      summary: Registrar movimentação manual de estoque
      description: |
        Tipos e direção:
        - **ENTRY** — entrada (delta positivo). Aceita `costPerUnit` opcional para atualizar custo.
        - **EXIT** — saída manual (delta negativo). Não pode deixar saldo negativo (BR41).
        - **LOSS** — perda/vencimento (delta negativo). Requer `reason`.
        - **ADJUSTMENT** — ajuste de inventário. Requer `direction` (INCREASE | DECREASE) e `reason`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ingredientId: { type: string, format: uuid }
                type: { type: string, enum: [ENTRY, EXIT, LOSS, ADJUSTMENT] }
                quantity: { type: number, minimum: 0.001 }
                costPerUnit: { type: number, minimum: 0, nullable: true }
                reason: { type: string, maxLength: 300, nullable: true }
                direction:
                  type: string
                  enum: [INCREASE, DECREASE]
                  description: Obrigatório quando type=ADJUSTMENT
              required: [ingredientId, type, quantity]
      responses:
        '201':
          description: Movimentação registrada
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/StockMovement' }
        '400':
          description: Saldo insuficiente (BR41)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '404': { $ref: '#/components/responses/NotFound' }

  /stores/{storeId}/inventory/insights:
    parameters:
      - { name: storeId, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [Inventory]
      summary: Insights de estoque (CMV, giro, itens críticos)
      responses:
        '200':
          description: Insights
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      cmvTotal: { type: number }
                      cmvPercent: { type: number }
                      lowStockCount: { type: integer }
                      topConsumed:
                        type: array
                        items:
                          type: object
                          properties:
                            ingredientId: { type: string, format: uuid }
                            name: { type: string }
                            consumed: { type: number }

  /stores/{storeId}/inventory/alerts:
    parameters:
      - { name: storeId, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [Inventory]
      summary: Listar ingredientes com alerta de estoque baixo
      responses:
        '200':
          description: Ingredientes abaixo do mínimo
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { type: array, items: { $ref: '#/components/schemas/Ingredient' } }

  # ── CUSTOMERS ─────────────────────────────────────────────────────────────

  /stores/{storeId}/customers:
    parameters:
      - { name: storeId, in: path, required: true, schema: { type: string, format: uuid } }
    get:
