                status: { type: string, enum: [ACTIVE, INACTIVE, ARCHIVED] }
                sortOrder: { type: integer, minimum: 0 }
              required: [name, price]
      responses:
        '201':
          description: Produto criado
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Product' }

