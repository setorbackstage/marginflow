openapi: 3.1.0
info:
  title: MarginFlow OS API
  version: 1.0.0
  description: |
    API REST do MarginFlow OS — sistema de gestão para restaurantes e estabelecimentos food service.

    ## Autenticação
    A API usa dois tokens:
    - **Access Token** (JWT Bearer, vida curta ~15 min) — enviado no header `Authorization: Bearer <token>`
    - **Refresh Token** (opaco, HTTP-only cookie `refresh_token`, vida longa ~7 dias) — renovado via `POST /auth/refresh`

    ## Envelope de resposta
    Todas as respostas seguem o envelope:
    ```json
    { "data": <payload> }
    ```
    Listas paginadas:
    ```json
    { "data": [...], "pagination": { "page": 1, "limit": 20, "total": 120, "totalPages": 6 } }
    ```
    Erros:
    ```json
    { "error": { "code": "SOME_CODE", "message": "...", "status": 400 } }
    ```

    ## Isolamento de tenant
    Todos os endpoints de loja validam que o usuário autenticado possui membership ativa naquela `storeId`.

servers:
  - url: /api/v1
    description: Servidor atual

security:
  - bearerAuth: []

tags:
  - name: Auth
    description: Autenticação e sessões
  - name: Store
    description: Configurações da loja
  - name: Products
    description: Produtos, receitas e modificadores
  - name: Categories
    description: Categorias de produtos
  - name: Menus
    description: Cardápios digitais e seções
  - name: Orders
    description: Pedidos e itens
  - name: Payments
    description: Pagamentos e reembolsos
  - name: Deliveries
    description: Entregas e rotas
  - name: Kitchen
    description: Tickets de cozinha e KDS
  - name: Inventory
    description: Ingredientes, movimentações e insights
  - name: Customers
    description: CRM e clientes
  - name: Team
    description: Equipe, convites e roles
  - name: Notifications
    description: Notificações push e alertas
  - name: Printers
    description: Impressoras, templates e jobs
  - name: Reports
    description: Relatórios e dashboard analítico
  - name: Audit
    description: Log de auditoria
  - name: Integrations
    description: Integrações com plataformas externas
  - name: Public
    description: Endpoints públicos (sem autenticação)

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # ── Pagination ────────────────────────────────────────────────────────
    PaginationMeta:
      type: object
      properties:
        page: { type: integer, example: 1 }
        limit: { type: integer, example: 20 }
        total: { type: integer, example: 120 }
        totalPages: { type: integer, example: 6 }
      required: [page, limit, total, totalPages]

    # ── Error ─────────────────────────────────────────────────────────────
    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code: { type: string, example: UNAUTHORIZED }
            message: { type: string, example: Token inválido ou expirado. }
            status: { type: integer, example: 401 }
            details: { type: object, nullable: true }
          required: [code, message, status]
      required: [error]

    # ── Auth / User ───────────────────────────────────────────────────────
    User:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        email: { type: string, format: email }
        status: { type: string, enum: [ACTIVE, INACTIVE, SUSPENDED] }
        lastLoginAt: { type: string, format: date-time, nullable: true }
      required: [id, name, email, status]

    Role:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string, example: OWNER }
        displayName: { type: string, example: Proprietário }
        permissions: { type: array, items: { type: string } }
        isSystemRole: { type: boolean }
      required: [id, name, displayName, permissions, isSystemRole]

    Membership:
      type: object
      properties:
        id: { type: string, format: uuid }
        userId: { type: string, format: uuid }
        storeId: { type: string, format: uuid }
        roleId: { type: string, format: uuid }
        status: { type: string, enum: [ACTIVE, INACTIVE] }
      required: [id, userId, storeId, roleId, status]

    MembershipWithRole:
      type: object
      properties:
        membership: { $ref: '#/components/schemas/Membership' }
        role: { $ref: '#/components/schemas/Role' }
        store: { $ref: '#/components/schemas/StoreBase' }
      required: [membership, role, store]

    LoginResult:
      type: object
      properties:
        accessToken: { type: string }
        refreshToken: { type: string }
        user: { $ref: '#/components/schemas/User' }
        memberships:
          type: array
          items: { $ref: '#/components/schemas/MembershipWithRole' }
      required: [accessToken, refreshToken, user, memberships]

    # ── Store ──────────────────────────────────────────────────────────────
    StoreBase:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        slug: { type: string }
        accountId: { type: string, format: uuid }
      required: [id, name, slug, accountId]

    Store:
      allOf:
        - $ref: '#/components/schemas/StoreBase'
        - type: object
          properties:
            phone: { type: string, nullable: true }
            address: { type: string, nullable: true }
            logoUrl: { type: string, nullable: true }
            bannerUrl: { type: string, nullable: true }
            primaryColor: { type: string, nullable: true }
            status: { type: string, enum: [ACTIVE, INACTIVE, SUSPENDED] }
            createdAt: { type: string, format: date-time }

    StoreSettings:
      type: object
      properties:
        currency: { type: string, example: BRL }
        timezone: { type: string, example: America/Sao_Paulo }
        language: { type: string, example: pt-BR }
        serviceChargeEnabled: { type: boolean }
        serviceChargePercent: { type: number, nullable: true }
        defaultPrepTimeMins: { type: integer, nullable: true }

    # ── Category ──────────────────────────────────────────────────────────
    Category:
      type: object
      properties:
        id: { type: string, format: uuid }
        storeId: { type: string, format: uuid }
        name: { type: string }
        description: { type: string, nullable: true }
        sortOrder: { type: integer }
        createdAt: { type: string, format: date-time }
      required: [id, storeId, name, sortOrder]

    # ── Product ───────────────────────────────────────────────────────────
    Product:
      type: object
      properties:
        id: { type: string, format: uuid }
        storeId: { type: string, format: uuid }
        name: { type: string }
        description: { type: string, nullable: true }
        price: { type: number, format: float }
        imageUrl: { type: string, nullable: true }
        categoryId: { type: string, format: uuid, nullable: true }
        status: { type: string, enum: [ACTIVE, INACTIVE, ARCHIVED] }
        sortOrder: { type: integer }
        createdAt: { type: string, format: date-time }
      required: [id, storeId, name, price, status, sortOrder]

    ModifierGroup:
      type: object
      properties:
        id: { type: string, format: uuid }
        productId: { type: string, format: uuid }
        name: { type: string }
        required: { type: boolean }
        minSelections: { type: integer }
        maxSelections: { type: integer }
        sortOrder: { type: integer }
      required: [id, productId, name, required, minSelections, maxSelections, sortOrder]

    Modifier:
      type: object
      properties:
        id: { type: string, format: uuid }
        groupId: { type: string, format: uuid }
        name: { type: string }
        priceAdjustment: { type: number, format: float }
        isDefault: { type: boolean }
        sortOrder: { type: integer }
      required: [id, groupId, name, priceAdjustment, isDefault, sortOrder]

    RecipeItem:
      type: object
      properties:
        ingredientId: { type: string, format: uuid }
        quantity: { type: number }
        unit: { type: string }
      required: [ingredientId, quantity, unit]

    # ── Menu ──────────────────────────────────────────────────────────────
    Menu:
      type: object
      properties:
        id: { type: string, format: uuid }
        storeId: { type: string, format: uuid }
        name: { type: string }
        description: { type: string, nullable: true }
        isPublished: { type: boolean }
        availabilitySchedule: { type: object, nullable: true }
        createdAt: { type: string, format: date-time }
      required: [id, storeId, name, isPublished]

    MenuSection:
      type: object
      properties:
        id: { type: string, format: uuid }
        menuId: { type: string, format: uuid }
        name: { type: string }
        description: { type: string, nullable: true }
        sortOrder: { type: integer }
        productIds: { type: array, items: { type: string, format: uuid } }
      required: [id, menuId, name, sortOrder, productIds]

    # ── Order ─────────────────────────────────────────────────────────────
    OrderItem:
      type: object
      properties:
        id: { type: string, format: uuid }
        orderId: { type: string, format: uuid }
        productId: { type: string, format: uuid }
        productName: { type: string }
        quantity: { type: integer }
        unitPrice: { type: number }
        totalPrice: { type: number }
        notes: { type: string, nullable: true }
        status: { type: string, enum: [PENDING, PREPARING, READY, DELIVERED, CANCELLED] }
      required: [id, orderId, productId, productName, quantity, unitPrice, totalPrice, status]

    Order:
      type: object
      properties:
        id: { type: string, format: uuid }
        storeId: { type: string, format: uuid }
        orderNumber: { type: integer }
        status:
          type: string
          enum: [PENDING, CONFIRMED, PREPARING, READY, DELIVERED, CANCELLED]
        channel: { type: string, enum: [COUNTER, DELIVERY, TABLE, WHATSAPP, IFOOD] }
        customerId: { type: string, format: uuid, nullable: true }
        tableNumber: { type: string, nullable: true }
        notes: { type: string, nullable: true }
        subtotal: { type: number }
        discount: { type: number }
        serviceCharge: { type: number }
        total: { type: number }
        items: { type: array, items: { $ref: '#/components/schemas/OrderItem' } }
        createdAt: { type: string, format: date-time }
      required: [id, storeId, orderNumber, status, channel, subtotal, discount, serviceCharge, total]

    # ── Payment ───────────────────────────────────────────────────────────
    Payment:
      type: object
      properties:
        id: { type: string, format: uuid }
        orderId: { type: string, format: uuid }
        storeId: { type: string, format: uuid }
        amount: { type: number }
        method: { type: string, enum: [CASH, CREDIT_CARD, DEBIT_CARD, PIX, VOUCHER, OTHER] }
        status: { type: string, enum: [PENDING, CONFIRMED, REFUNDED, FAILED] }
        externalRef: { type: string, nullable: true }
        paidAt: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time }
      required: [id, orderId, storeId, amount, method, status]

    # ── Delivery ──────────────────────────────────────────────────────────
    Delivery:
      type: object
      properties:
        id: { type: string, format: uuid }
        orderId: { type: string, format: uuid }
        storeId: { type: string, format: uuid }
        address: { type: string }
        status: { type: string, enum: [PENDING, ASSIGNED, IN_TRANSIT, DELIVERED, FAILED] }
        driverName: { type: string, nullable: true }
        driverPhone: { type: string, nullable: true }
        estimatedMinutes: { type: integer, nullable: true }
        createdAt: { type: string, format: date-time }
      required: [id, orderId, storeId, address, status]

    # ── Kitchen ───────────────────────────────────────────────────────────
    KitchenTicket:
      type: object
      properties:
        id: { type: string, format: uuid }
        orderId: { type: string, format: uuid }
        storeId: { type: string, format: uuid }
        status: { type: string, enum: [OPEN, IN_PROGRESS, DONE, CANCELLED] }
        priority: { type: integer }
        createdAt: { type: string, format: date-time }
      required: [id, orderId, storeId, status, priority]

    KitchenItem:
      type: object
      properties:
        id: { type: string, format: uuid }
        ticketId: { type: string, format: uuid }
        name: { type: string }
        quantity: { type: integer }
        status: { type: string, enum: [PENDING, PREPARING, DONE, CANCELLED] }
        notes: { type: string, nullable: true }
      required: [id, ticketId, name, quantity, status]

    # ── Inventory ─────────────────────────────────────────────────────────
    Ingredient:
      type: object
      properties:
        id: { type: string, format: uuid }
        storeId: { type: string, format: uuid }
        name: { type: string }
        unit: { type: string, enum: [G, KG, ML, L, UN] }
        currentStock: { type: number }
        minStock: { type: number, nullable: true }
        costPerUnit: { type: number, nullable: true }
        category: { type: string, nullable: true }
        status: { type: string, enum: [ACTIVE, INACTIVE] }
        deletedAt: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time }
      required: [id, storeId, name, unit, currentStock, status]

    StockMovement:
      type: object
      properties:
        id: { type: string, format: uuid }
        storeId: { type: string, format: uuid }
        ingredientId: { type: string, format: uuid }
        type: { type: string, enum: [ENTRY, EXIT, LOSS, ADJUSTMENT] }
        quantityDelta: { type: number }
        unitCost: { type: number, nullable: true }
        reason: { type: string, nullable: true }
        orderId: { type: string, format: uuid, nullable: true }
        createdByUserId: { type: string, format: uuid }
        createdAt: { type: string, format: date-time }
      required: [id, storeId, ingredientId, type, quantityDelta, createdByUserId]

    # ── Customer ──────────────────────────────────────────────────────────
    Customer:
      type: object
      properties:
        id: { type: string, format: uuid }
        storeId: { type: string, format: uuid }
        name: { type: string }
        phone: { type: string }
        email: { type: string, format: email, nullable: true }
        taxId: { type: string, nullable: true }
        notes: { type: string, nullable: true }
        status: { type: string, enum: [ACTIVE, BLOCKED] }
        totalOrders: { type: integer }
        totalSpent: { type: number }
        lastOrderAt: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time }
      required: [id, storeId, name, phone, status, totalOrders, totalSpent]

    CustomerAddress:
      type: object
      properties:
        id: { type: string, format: uuid }
        customerId: { type: string, format: uuid }
        label: { type: string }
        street: { type: string }
        number: { type: string }
        complement: { type: string, nullable: true }
        neighborhood: { type: string }
        city: { type: string }
        state: { type: string }
        postalCode: { type: string }
        isDefault: { type: boolean }
      required: [id, customerId, label, street, number, neighborhood, city, state, postalCode, isDefault]

    # ── Notification ──────────────────────────────────────────────────────
    Notification:
      type: object
      properties:
        id: { type: string, format: uuid }
        storeId: { type: string, format: uuid }
        type: { type: string }
        title: { type: string }
        body: { type: string }
        entityType: { type: string, nullable: true }
        entityId: { type: string, nullable: true }
        readAt: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time }
      required: [id, storeId, type, title, body]

    # ── Printer ───────────────────────────────────────────────────────────
    Printer:
      type: object
      properties:
        id: { type: string, format: uuid }
        storeId: { type: string, format: uuid }
        name: { type: string }
        type: { type: string, enum: [THERMAL, LABEL, INKJET] }
        connectionType: { type: string, enum: [USB, NETWORK, BLUETOOTH] }
        address: { type: string, nullable: true }
        isDefault: { type: boolean }
        status: { type: string, enum: [ONLINE, OFFLINE, ERROR] }
      required: [id, storeId, name, type, connectionType, isDefault, status]

    PrintTemplate:
      type: object
      properties:
        id: { type: string, format: uuid }
        storeId: { type: string, format: uuid }
        name: { type: string }
        type: { type: string, enum: [ORDER, RECEIPT, LABEL, KITCHEN] }
        content: { type: string }
        isDefault: { type: boolean }
      required: [id, storeId, name, type, content, isDefault]

    PrintRule:
      type: object
      properties:
        id: { type: string, format: uuid }
        storeId: { type: string, format: uuid }
        event: { type: string }
        printerId: { type: string, format: uuid }
        templateId: { type: string, format: uuid }
        copies: { type: integer, minimum: 1 }
        enabled: { type: boolean }
      required: [id, storeId, event, printerId, templateId, copies, enabled]

    PrintJob:
      type: object
      properties:
        id: { type: string, format: uuid }
        storeId: { type: string, format: uuid }
        printerId: { type: string, format: uuid }
        templateId: { type: string, format: uuid, nullable: true }
        status: { type: string, enum: [PENDING, PRINTING, DONE, FAILED] }
        copies: { type: integer }
        payload: { type: object }
        createdAt: { type: string, format: date-time }
      required: [id, storeId, printerId, status, copies, payload]

    # ── Audit ─────────────────────────────────────────────────────────────
    AuditLog:
      type: object
      properties:
        id: { type: string, format: uuid }
        storeId: { type: string, format: uuid }
        userId: { type: string, format: uuid, nullable: true }
        action: { type: string, example: order.created }
        entityType: { type: string, example: Order }
        entityId: { type: string, nullable: true }
        entityRef: { type: string, nullable: true }
        metadata: { type: object, nullable: true }
        createdAt: { type: string, format: date-time }
      required: [id, storeId, action, entityType]

    # ── Integration ───────────────────────────────────────────────────────
    Integration:
      type: object
      properties:
        id: { type: string, format: uuid }
        storeId: { type: string, format: uuid }
        platform: { type: string, enum: [IFOOD, RAPPI, AIQFOME] }
        status: { type: string, enum: [ACTIVE, INACTIVE, ERROR] }
        lastSyncAt: { type: string, format: date-time, nullable: true }
        credentials: { type: object, nullable: true }
      required: [id, storeId, platform, status]

  responses:
    Unauthorized:
      description: Token inválido, expirado ou ausente
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Forbidden:
      description: Sem permissão para este recurso
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    NotFound:
      description: Recurso não encontrado
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Conflict:
      description: Conflito (ex. e-mail já cadastrado)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    UnprocessableEntity:
      description: Dados de entrada inválidos
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }

# ═══════════════════════════════════════════════════════════════════════════
# PATHS
# ═══════════════════════════════════════════════════════════════════════════
paths:

  # ── AUTH ──────────────────────────────────────────────────────────────────

  /auth/signup:
    post:
      tags: [Auth]
      summary: Criar conta e loja
      description: Provisiona uma conta, loja, roles padrão e retorna o usuário autenticado. Rate limit 5/min por IP.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                storeName: { type: string, minLength: 2, maxLength: 120 }
                ownerName: { type: string, minLength: 2, maxLength: 80 }
                email: { type: string, format: email }
                passwordHash: { type: string, description: Hash bcrypt da senha }
                phone: { type: string, minLength: 8, maxLength: 20 }
                storeType: { type: string, enum: [RESTAURANT, BAR, CAFE, BAKERY, OTHER] }
              required: [storeName, ownerName, email, passwordHash, phone, storeType]
      responses:
        '201':
          description: Conta criada — retorna LoginResult
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/LoginResult' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }

  /auth/login:
    post:
      tags: [Auth]
      summary: Login
      description: Autentica email/senha. Rate limit 10/min por IP.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string, format: email }
                password: { type: string }
              required: [email, password]
      responses:
        '200':
          description: Autenticado
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/LoginResult' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout
      description: Revoga o refresh token atual.
      responses:
        '204':
          description: Sessão encerrada
        '401': { $ref: '#/components/responses/Unauthorized' }

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Renovar access token
      description: Usa o cookie HTTP-only `refresh_token` para emitir um novo access token. Rate limit 30/min por IP.
      security: []
      responses:
        '200':
          description: Novo access token
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      accessToken: { type: string }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /auth/me:
    get:
      tags: [Auth]
      summary: Perfil do usuário autenticado
      responses:
        '200':
          description: Perfil e memberships
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/LoginResult' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /auth/forgot-password:
    post:
      tags: [Auth]
      summary: Solicitar reset de senha
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string, format: email }
              required: [email]
      responses:
        '204':
          description: E-mail de reset enviado (resposta idêntica mesmo se e-mail não existir)

  /auth/reset-password:
    post:
      tags: [Auth]
      summary: Redefinir senha via token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token: { type: string }
                password: { type: string, minLength: 8 }
              required: [token, password]
      responses:
        '204':
          description: Senha redefinida
        '401': { $ref: '#/components/responses/Unauthorized' }

  /auth/accept-invitation:
    post:
      tags: [Auth]
      summary: Aceitar convite de equipe
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token: { type: string }
                name: { type: string, minLength: 2 }
                password: { type: string, minLength: 8 }
              required: [token, name, password]
      responses:
        '200':
          description: Convite aceito — retorna LoginResult
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/LoginResult' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /auth/approval-password:
    post:
      tags: [Auth]
      summary: Verificar senha de aprovação (override gerencial)
      description: Valida a senha do manager para autorizar operações que requerem aprovação presencial.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                storeId: { type: string, format: uuid }
                password: { type: string }
              required: [storeId, password]
      responses:
        '200':
          description: Senha válida
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      valid: { type: boolean }
        '401': { $ref: '#/components/responses/Unauthorized' }

  # ── STORE ────────────────────────────────────────────────────────────────

  /stores/{storeId}:
    parameters:
      - { name: storeId, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [Store]
      summary: Obter dados da loja
      responses:
        '200':
          description: Loja
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Store' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [Store]
      summary: Atualizar loja
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string, minLength: 2, maxLength: 120 }
                phone: { type: string, maxLength: 20, nullable: true }
                address: { type: string, maxLength: 300, nullable: true }
                logoUrl: { type: string, format: uri, nullable: true }
                bannerUrl: { type: string, format: uri, nullable: true }
                primaryColor: { type: string, pattern: '^#[0-9a-fA-F]{6}$', nullable: true }
      responses:
        '200':
          description: Loja atualizada
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Store' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /stores/{storeId}/settings:
    parameters:
      - { name: storeId, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [Store]
      summary: Obter configurações da loja
      responses:
        '200':
          description: Configurações
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/StoreSettings' }
    patch:
      tags: [Store]
      summary: Atualizar configurações da loja
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                currency: { type: string }
                timezone: { type: string }
                language: { type: string }
                serviceChargeEnabled: { type: boolean }
                serviceChargePercent: { type: number, nullable: true }
                defaultPrepTimeMins: { type: integer, nullable: true }
      responses:
        '200':
          description: Configurações atualizadas
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/StoreSettings' }

  /stores/{storeId}/upload:
    parameters:
      - { name: storeId, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      tags: [Store]
      summary: Upload de imagem (logo ou banner)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: Imagem JPEG, PNG, WebP ou GIF. Máximo 5 MB.
                type:
                  type: string
                  enum: [logo, banner]
              required: [file, type]
      responses:
        '200':
          description: URL pública da imagem no Supabase Storage
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      url: { type: string, format: uri }
        '400': { $ref: '#/components/responses/UnprocessableEntity' }
        '413':
          description: Arquivo maior que 5 MB
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

