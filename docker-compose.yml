services:
  db:
    image: postgres:17-alpine
    container_name: marginflow-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: marginflow
    ports:
      - "5432:5432"
    volumes:
      - marginflow-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d marginflow"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  marginflow-db-data:
